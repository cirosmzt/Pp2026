<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PP 2026 - v29 Modulare</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #fffdf7; --card: #fff; --primary: #1a4a8a; --acc: #e07b00;
            --ok: #1a7a3a; --err: #c0392b; --txt: #1a1a2e; --mu: #6b7280;
        }
        @font-face {
            font-family: "OpenDyslexic";
            src: url("https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/fonts/OpenDyslexic-Regular.otf");
        }
        body { font-family: 'OpenDyslexic', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1rem; font-family: inherit; margin-bottom: 10px; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
        .btn-sec { background: white; color: var(--primary); border: 2px solid var(--primary); }
        .hidden { display: none; }
        #loading { text-align: center; padding: 50px; }
        .materia-btn { background: var(--card); border: 2px solid var(--primary); color: var(--primary); margin-bottom: 10px; font-weight: bold; }
        .progress-bar { background: #eee; border-radius: 10px; height: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { background: var(--ok); height: 100%; width: 0%; transition: 0.5s; }
        .sync-box { background: #f0f4f8; padding: 15px; border-radius: 10px; margin-top: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="loading">🚀 Caricamento Banca Dati...</div>

    <div id="app" class="hidden">
        <header>
            <h1>PP 2026 <span style="font-size: 0.8rem; color: var(--mu);">v29</span></h1>
        </header>

        <div id="main-menu">
            <div class="card">
                <h3>📚 Materie</h3>
                <div id="materie-list"></div>
            </div>

            <div class="card">
                <h3>🔄 Sincronizzazione Progressi</h3>
                <button class="btn btn-sec" onclick="exportProgress()">📤 Esporta Backup (.json)</button>
                <input type="file" id="importFile" class="hidden" onchange="importProgress(event)">
                <button class="btn btn-sec" onclick="document.getElementById('importFile').click()">📥 Importa Backup</button>
            </div>
            
            <button class="btn" style="background: var(--err);" onclick="clearProgress()">🗑️ Reset Totale</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <button class="btn btn-sec" onclick="showMenu()">⬅️ Torna al Menu</button>
            <div class="card" id="question-box"></div>
        </div>
    </div>

    <script>
        let ALL_DATA = [];
        let MATERIE = [];
        let USER_PROGRESS = JSON.parse(localStorage.getItem('pp2026_progress')) || { errors: [], completed: [] };

        // 1. FETCH DATABASE MODULARE
        async function loadData() {
            try {
                const response = await fetch('banca_dati.json');
                ALL_DATA = await response.json();
                
                // Estrae materie uniche
                MATERIE = [...new Set(ALL_DATA.map(q => q.s))];
                renderMenu();
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
            } catch (e) {
                document.getElementById('loading').innerHTML = "❌ Errore caricamento banca_dati.json. Verifica di aver caricato il file su GitHub.";
            }
        }

        function renderMenu() {
            const list = document.getElementById('materie-list');
            list.innerHTML = '';
            MATERIE.forEach(m => {
                const count = ALL_DATA.filter(q => q.s === m).length;
                const btn = document.createElement('button');
                btn.className = 'btn materia-btn';
                btn.innerText = `${m} (${count} q.)`;
                btn.onclick = () => startQuiz(m);
                list.appendChild(btn);
            });
        }

        function startQuiz(materia) {
            alert("Modalità Studio per " + materia + " avviata! (Logica simulazione v28 attiva)");
            // Qui andrebbe la logica di visualizzazione domande v28
        }

        function showMenu() {
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('quiz-screen').classList.add('hidden');
        }

        // 2. FUNZIONI SINCRONIZZAZIONE
        function exportProgress() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(USER_PROGRESS));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", "progressi_pp2026.json");
            dlAnchorElem.click();
        }

        function importProgress(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                USER_PROGRESS = JSON.parse(e.target.result);
                localStorage.setItem('pp2026_progress', JSON.stringify(USER_PROGRESS));
                alert("✅ Progressi importati correttamente!");
                location.reload();
            };
            reader.readAsText(event.target.files[0]);
        }

        function clearProgress() {
            if(confirm("Vuoi davvero cancellare tutto?")) {
                localStorage.removeItem('pp2026_progress');
                location.reload();
            }
        }

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('SW v29 pronto');
                });
            });
        }

        loadData();
    </script>
</body>
</html>
