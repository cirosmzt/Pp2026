<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Studio Polizia Penitenziaria 2026 - v29</title>
<link rel="manifest" href="manifest.json">
<style>
:root { --bg: #fffdf7; --card: #fff; --primary: #1a4a8a; --pl: #e8f0fb; --acc: #e07b00; --ok: #1a7a3a; --okbg: #e6f5ec; --err: #c0392b; --errbg: #fdecea; --txt: #1a1a2e; --mu: #6b7280; }
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--txt); line-height: 1.5; padding-bottom: 30px; }
.navbar { background: var(--primary); color: white; padding: 12px 16px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.container { padding: 16px; max-width: 600px; margin: 0 auto; }
.card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 16px; border: 1px solid #eee; }
.subject-label { color: var(--primary); font-size: 0.8rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }
.question-text { font-size: 1.15rem; font-weight: bold; margin-bottom: 20px; color: var(--txt); }
.option { padding: 14px; border: 2px solid var(--pl); border-radius: 10px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; font-size: 1rem; position: relative; overflow: hidden; }
.option:active { transform: scale(0.98); }
.option.correct { background: var(--okbg); border-color: var(--ok); color: var(--ok); font-weight: bold; }
.option.wrong { background: var(--errbg); border-color: var(--err); color: var(--err); }
.btn { display: block; width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 15px; font-family: inherit; }
.btn-next { background: var(--primary); color: white; box-shadow: 0 4px 0 #122b45; }
.btn-next:active { box-shadow: 0 0 0; transform: translateY(4px); }
.anchor-info { background: #fff8e1; border: 1px solid #ffe082; padding: 10px; border-radius: 8px; margin-top: 15px; font-size: 0.9rem; color: #856404; }
#loading { text-align: center; padding: 100px 20px; }
</style>
</head>
<body>
<div class="navbar"><strong>PP 2026 - v29</strong> <span id="db-count" style="font-size:0.7rem; opacity:0.8;"></span></div>
<div id="loading">🚀 Inizializzazione banca dati...</div>
<div id="app" class="container" style="display:none;">
    <div class="card">
        <span id="subject" class="subject-label">Materia</span>
        <div id="question" class="question-text">Caricamento...</div>
        <div id="options"></div>
        <div id="anchor-box" class="anchor-info" style="display:none;"></div>
        <button id="next-btn" class="btn btn-next" style="display:none;">DOMANDA SUCCESSIVA ➡️</button>
    </div>
</div>
<script>
let database = [];
let currentQ = null;

async function init() {
    try {
        const res = await fetch('banca_dati.json?v=' + Date.now());
        database = await res.json();
        document.getElementById('db-count').innerText = database.length + ' QUESITI';
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        newQuestion();
    } catch(e) {
        document.getElementById('loading').innerHTML = "❌ Errore critico nel caricamento delle domande.<br>Controlla banca_dati.json su GitHub.";
    }
}

function newQuestion() {
    currentQ = database[Math.floor(Math.random() * database.length)];
    document.getElementById('subject').innerText = currentQ.s || "Generale";
    document.getElementById('question').innerText = currentQ.q || currentQ.d; // Supporta entrambi i formati
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('anchor-box').style.display = 'none';
    
    const optsDiv = document.getElementById('options');
    optsDiv.innerHTML = '';
    
    // Gestione dei diversi formati risposta (r come array o a,b,c,d separati)
    let answers = currentQ.r || [currentQ.a, currentQ.b, currentQ.c, currentQ.d];
    let correctIdx = currentQ.esatta !== undefined ? currentQ.esatta : (currentQ.r ? 0 : 0); // Di default 0 se non specificato

    answers.forEach((txt, i) => {
        if(!txt) return;
        const div = document.createElement('div');
        div.className = 'option';
        div.innerHTML = `<strong>${String.fromCharCode(65+i)})</strong> ${txt}`;
        div.onclick = () => check(i, correctIdx, div, answers);
        optsDiv.appendChild(div);
    });
}

function check(idx, correct, el, allAns) {
    if(document.getElementById('next-btn').style.display === 'block') return;
    const options = document.querySelectorAll('.option');
    options.forEach((opt, i) => { if(i === correct) opt.classList.add('correct'); });
    if(idx !== correct) el.classList.add('wrong');
    
    // Algoritmo Parola Ancora
    const correctText = allAns[correct].toLowerCase();
    const words = correctText.split(/\s+/).filter(w => w.length > 4);
    const others = allAns.filter((_, i) => i !== correct).join(' ').toLowerCase();
    const anchor = words.find(w => !others.includes(w));
    
    if(anchor) {
        const box = document.getElementById('anchor-box');
        box.innerHTML = `💡 <strong>Parola àncora:</strong> <span style="text-decoration:underline">${anchor.toUpperCase()}</span> (Unica nella risposta corretta)`;
        box.style.display = 'block';
    }
    document.getElementById('next-btn').style.display = 'block';
}

document.getElementById('next-btn').onclick = newQuestion;
if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js')); }
init();
</script>
</body>
