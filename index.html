<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PP 2026 - v29 Modulare Completa</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #fffdf7; --card: #fff; --primary: #1a4a8a; --acc: #e07b00; --ok: #1a7a3a; --err: #c0392b; --txt: #1a1a2e; --mu: #6b7280; }
        @font-face { font-family: "OpenDyslexic"; src: url("https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/fonts/OpenDyslexic-Regular.otf"); }
        body { font-family: 'OpenDyslexic', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 15px; padding-bottom: 80px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #eee; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1rem; font-family: inherit; margin-bottom: 10px; font-weight: bold; }
        .btn-sec { background: #f0f4f8; color: var(--primary); border: 1px solid var(--primary); }
        .hidden { display: none; }
        .materia-btn { background: var(--card); border: 2px solid var(--primary); color: var(--primary); text-align: left; margin-bottom: 10px; }
        .materia-btn span { font-size: 0.7rem; color: var(--mu); display: block; }
        .q-text { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; }
        .ans-btn { background: #f9f9f9; border: 2px solid #eee; padding: 12px; border-radius: 8px; margin-bottom: 10px; width: 100%; text-align: left; font-family: inherit; }
        .ans-btn.correct { background: #e6f5ec; border-color: var(--ok); color: var(--ok); }
        .ans-btn.wrong { background: #fdecea; border-color: var(--err); color: var(--err); }
        .anchor { color: var(--acc); text-decoration: underline; font-weight: bold; }
        #loading { text-align: center; padding: 100px 20px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div id="loading">🚀 Caricamento in corso...</div>
    <div id="app" class="hidden">
        <div id="screen-menu">
            <h2 style="color: var(--primary);">📚 Materie PP 2026 (v29)</h2>
            <div id="materie-list"></div>
            <div class="card" style="margin-top: 20px;">
                <h4>🔄 Backup Progressi</h4>
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-sec" onclick="exportProgress()">📤 Esporta</button>
                    <button class="btn btn-sec" onclick="document.getElementById('importFile').click()">📥 Importa</button>
                </div>
                <input type="file" id="importFile" class="hidden" onchange="importProgress(event)">
            </div>
        </div>
        <div id="screen-quiz" class="hidden">
            <button class="btn btn-sec" style="width:auto;" onclick="location.reload()">🏠 Menu</button>
            <div class="card">
                <div id="quiz-info" style="font-size:0.8rem; margin-bottom:10px;"></div>
                <div class="q-text" id="q-text"></div>
                <div id="ans-list"></div>
            </div>
            <div id="explanation" class="card hidden">
                <div id="anchor-msg"></div>
                <button class="btn" style="margin-top:10px;" onclick="nextQuestion()">Prossima Domanda ➡️</button>
            </div>
        </div>
    </div>

    <script>
        let ALL_DATA = [];
        let CURRENT_LIST = [];
        let CURRENT_IDX = 0;

        async function loadApp() {
            try {
                // Carica il file JSON con un parametro per evitare la cache vecchia
                const res = await fetch('banca_dati.json?v=' + Date.now());
                if (!res.ok) throw new Error();
                ALL_DATA = await res.json();
                renderMaterie();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
            } catch (e) {
                document.getElementById('loading').innerHTML = "❌ Errore caricamento banca_dati.json.<br>Controlla che il file sia su GitHub e che il nome sia tutto minuscolo.";
            }
        }

        function renderMaterie() {
            const list = document.getElementById('materie-list');
            const materie = [...new Set(ALL_DATA.map(q => q.s))];
            list.innerHTML = '';
            materie.forEach(m => {
                const total = ALL_DATA.filter(q => q.s === m).length;
                const btn = document.createElement('button');
                btn.className = 'btn materia-btn';
                btn.innerHTML = `${m} <span>${total} domande</span>`;
                btn.onclick = () => startQuiz(m);
                list.appendChild(btn);
            });
        }

        function startQuiz(m) {
            CURRENT_LIST = ALL_DATA.filter(q => q.s === m);
            CURRENT_IDX = 0;
            document.getElementById('screen-menu').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = CURRENT_LIST[CURRENT_IDX];
            document.getElementById('quiz-info').innerText = `${q.s} - ${CURRENT_IDX + 1}/${CURRENT_LIST.length}`;
            document.getElementById('q-text').innerText = q.d;
            document.getElementById('explanation').classList.add('hidden');
            const list = document.getElementById('ans-list');
            list.innerHTML = '';
            q.r.forEach((t, i) => {
                const b = document.createElement('button');
                b.className = 'ans-btn';
                b.innerText = t;
                b.onclick = () => {
                    const btns = document.querySelectorAll('.ans-btn');
                    btns.forEach(btn => btn.disabled = true);
                    if(i === q.esatta) {
                        b.classList.add('correct');
                        document.getElementById('anchor-msg').innerHTML = "✅ Corretto!";
                    } else {
                        b.classList.add('wrong');
                        btns[q.esatta].classList.add('correct');
                        document.getElementById('anchor-msg').innerHTML = "❌ Sbagliato.";
                    }
                    document.getElementById('explanation').classList.remove('hidden');
                };
                list.appendChild(b);
            });
        }

        function nextQuestion() {
            CURRENT_IDX++;
            if(CURRENT_IDX < CURRENT_LIST.length) renderQuestion();
            else location.reload();
        }

        function exportProgress() { alert("Funzione disponibile nella v30"); }
        function importProgress() { alert("Funzione disponibile nella v30"); }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
        }
        loadApp();
    </script>
</body>
</html>
